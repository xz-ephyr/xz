name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.0)'
        required: true
        default: 'v1.0.0'
      release_notes:
        description: 'What is new in this release (shown to users)'
        required: true
        default: 'Bug fixes and performance improvements'
      prerelease:
        description: 'Mark as pre-release?'
        required: true
        type: boolean
        default: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends 
            libwebkit2gtk-4.1-dev 
            libsoup-3.0-dev 
            libjavascriptcoregtk-4.1-dev 
            build-essential 
            curl 
            wget 
            file 
            libxdo-dev 
            libssl-dev 
            libayatana-appindicator3-dev 
            librsvg2-dev 
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Build the app
        run: npm run desktop:prebuild

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.version }}
          releaseName: ${{ github.event.inputs.version }}
          releaseBody: ${{ github.event.inputs.release_notes }}
          releaseDraft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          args: --target ${{ matrix.target }}
